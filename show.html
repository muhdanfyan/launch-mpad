<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <title>M-PAD - Selamat Datang</title>
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="css/normalize.css?v=1.1" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="css/font-awesome.min.css?v=1.1">
    <link href="css/style.css?v=1.1" rel="stylesheet" type="text/css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #ffffff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .bg-decoration {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.1;
            background: url('images/bg-bapenda.jpg') no-repeat center center;
            background-size: cover;
            filter: saturate(1.5) blur(5px);
        }

        .success-wrapper {
            position: relative;
            z-index: 10;
            max-width: 1100px;
            width: 90%;
            padding: 40px;
            animation: fadeInUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .content-flex {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 80px;
        }

        .text-content {
            flex: 1;
        }

        .mpad-logo-large {
            height: 120px;
            width: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0 20px 40px rgba(37, 99, 235, 0.3));
            animation: float 6s ease-in-out infinite;
        }

        .status-pill {
            display: inline-block;
            background: rgba(34, 197, 94, 0.1);
            color: #16a34a;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        h1 {
            font-size: 48px;
            font-weight: 900;
            line-height: 1.1;
            color: #0f172a;
            margin-bottom: 20px;
        }

        .sub-title {
            font-size: 20px;
            line-height: 1.8;
            color: #64748b;
            margin-bottom: 40px;
        }

        .btn-launch {
            display: inline-block;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            box-shadow: 0 20px 40px -10px rgba(37, 99, 235, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 10px;
        }

        .btn-launch:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 30px 60px -10px rgba(37, 99, 235, 0.6);
        }

        .app-preview-container {
            flex: 0 0 auto;
            perspective: 1000px;
        }

        .phone-mockup {
            width: 300px;
            aspect-ratio: 607 / 1024;
            background: #000;
            border-radius: 45px;
            border: 10px solid #1e293b;
            position: relative;
            box-shadow: 0 50px 120px -20px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            background: #f8fafc;
            height: auto;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            border-radius: 35px;
        }

        .slider {
            display: flex;
            flex-direction: row;
            width: 600%;
            animation: fastSlide 18s cubic-bezier(0.85, 0, 0.15, 1) infinite;
        }

        .slider img {
            width: 16.666%;
            height: auto;
            aspect-ratio: 607 / 1024;
            object-fit: cover;
            display: block;
        }

        .phone-frame::after {
            content: '';
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 22px;
            background: #1e293b;
            border-radius: 12px;
            z-index: 20;
        }

        @keyframes fastSlide {
            0% {
                transform: translateX(0);
            }

            10% {
                transform: translateX(0);
            }

            13% {
                transform: translateX(-16.666%);
            }

            23% {
                transform: translateX(-16.666%);
            }

            26% {
                transform: translateX(-33.333%);
            }

            36% {
                transform: translateX(-33.333%);
            }

            39% {
                transform: translateX(-50%);
            }

            49% {
                transform: translateX(-50%);
            }

            52% {
                transform: translateX(-66.666%);
            }

            85% {
                transform: translateX(-66.666%);
            }

            88% {
                transform: translateX(-83.333%);
            }

            100% {
                transform: translateX(-83.333%);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 991px) {
            .content-flex {
                flex-direction: column;
                text-align: center;
                gap: 50px;
            }

            h1 {
                font-size: 36px;
            }

            .sub-title {
                font-size: 18px;
            }
        }

        /* Fullscreen Toggle */
        .fullscreen-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #2563eb;
            font-size: 20px;
        }

        .fullscreen-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 40px -5px rgba(37, 99, 235, 0.2);
        }

        @media (max-width: 768px) {
            .fullscreen-toggle {
                top: 15px;
                right: 15px;
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="fullscreen-toggle" id="fullscreen-toggle" title="Toggle Fullscreen">
        <i class="fa fa-expand"></i>
    </div>
    <div class="bg-decoration"></div>
    <div class="success-wrapper">
        <div class="content-flex">
            <div class="text-content">
                <div class="status-pill">Aplikasi Telah Aktif</div>
                <div class="mpad-logo-wrapper">
                    <img src="images/logo-mpad.png" alt="M-PAD Logo" class="mpad-logo-large">
                </div>
                <h1>Selamat Datang di M-PAD</h1>
                <p class="sub-title">Aplikasi Pembayaran Pajak & Retribusi Daerah Kota Baubau kini siap digunakan untuk
                    mempermudah layanan publik Anda.</p>
                <div class="action-buttons">
                    <a href="https://mpad.baubaukota.go.id" class="btn-launch">Buka Aplikasi Sekarang</a>
                </div>
            </div>

            <div class="app-preview-container">
                <div class="phone-mockup">
                    <div class="phone-screen">
                        <div class="slider">
                            <img src="images/app-1.png" alt="App Screen 1">
                            <img src="images/app-2.png" alt="App Screen 2">
                            <img src="images/app-3.png" alt="App Screen 3">
                            <img src="images/app-4.png" alt="App Screen 4">
                            <img src="images/app-5.png" alt="App Screen 5">
                            <!-- Duplicate first for seamless loop -->
                            <img src="images/app-1.png" alt="App Screen 1">
                        </div>
                    </div>
                    <div class="phone-frame"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        window.addEventListener('load', () => {
            const duration = 30 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function () {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                // since particles fall down, start a bit higher than random
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            // Fullscreen logic
            const fullscreenToggle = document.getElementById('fullscreen-toggle');

            function toggleFullscreen() {
                if (!document.fullscreenElement) {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        document.documentElement.webkitRequestFullscreen();
                    } else if (document.documentElement.msRequestFullscreen) {
                        document.documentElement.msRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                }
            }

            fullscreenToggle.addEventListener('click', toggleFullscreen);

            document.addEventListener('fullscreenchange', () => {
                const icon = fullscreenToggle.querySelector('i');
                if (document.fullscreenElement) {
                    icon.classList.remove('fa-expand');
                    icon.classList.add('fa-compress');
                } else {
                    icon.classList.remove('fa-compress');
                    icon.classList.add('fa-expand');
                }
            });

            // Attempt auto fullscreen on load (might be blocked by browser)
            try {
                toggleFullscreen();
            } catch (e) {
                console.log("Auto-fullscreen blocked");
            }

            // Fallback: request fullscreen on first click anywhere
            const firstClickFullscreen = () => {
                if (!document.fullscreenElement) {
                    toggleFullscreen();
                }
                document.removeEventListener('click', firstClickFullscreen);
            };
            document.addEventListener('click', firstClickFullscreen);
        });
    </script>
</body>

</html>
